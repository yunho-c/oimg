name: Linux Debian APT Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish Debian APT package
    # Use 22.04 as the Linux compatibility baseline so the package runs on
    # systems with older GLib. Move back to ubuntu-24.04 once 22.04 support
    # is no longer needed or the Linux build no longer links newer GLib symbols.
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    env:
      APT_REPO_DIR: ${{ github.workspace }}/apt-repo
      DIST_DIR: ${{ github.workspace }}/oimg/debian/packages
      R2_BUCKET: oimg-apt

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Validate required secrets
        shell: bash
        env:
          CI_REPO_TOKEN: ${{ secrets.CI_REPO_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            CI_REPO_TOKEN \
            GPG_KEY_ID \
            GPG_PASSPHRASE \
            GPG_PRIVATE_KEY \
            R2_ACCESS_KEY_ID \
            R2_ENDPOINT \
            R2_SECRET_ACCESS_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Checkout oimg
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          path: oimg
          fetch-depth: 0

      - name: Validate tag is on main
        shell: bash
        working-directory: oimg
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release tag ${{ steps.release.outputs.tag }} must point to a commit reachable from origin/main." >&2
            exit 1
          fi

      - name: Checkout slimg
        uses: actions/checkout@v4
        with:
          repository: yunho-c/slimg
          ref: main
          path: slimg
          token: ${{ secrets.CI_REPO_TOKEN }}
          submodules: recursive

      - name: Checkout tjdistler-iqa-fork
        uses: actions/checkout@v4
        with:
          repository: yunho-c/tjdistler-iqa-fork
          ref: perf/simd-gaussian-vertical
          path: tjdistler-iqa-fork
          token: ${{ secrets.CI_REPO_TOKEN }}

      - name: Checkout irondash
        uses: actions/checkout@v4
        with:
          repository: yunho-c/irondash
          ref: fix/macos-engine-context-race
          path: irondash
          token: ${{ secrets.CI_REPO_TOKEN }}

      - name: Validate pubspec version
        shell: bash
        working-directory: oimg
        run: |
          set -euo pipefail
          pubspec_version="$(awk '/^version:/ { split($2, parts, "+"); print parts[1]; exit }' pubspec.yaml)"
          tag_version="${{ steps.release.outputs.version }}"

          if [[ -z "$pubspec_version" ]]; then
            echo "Could not read version from pubspec.yaml" >&2
            exit 1
          fi

          if [[ "$pubspec_version" != "$tag_version" ]]; then
            echo "Tag version ($tag_version) does not match pubspec.yaml ($pubspec_version)" >&2
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build and APT repository tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            build-essential \
            clang \
            cmake \
            desktop-file-utils \
            dpkg-dev \
            gnupg \
            libblkid-dev \
            libclang-dev \
            libgtk-3-dev \
            liblzma-dev \
            nasm \
            ninja-build \
            pkg-config \
            python3 \
            python3-nautilus \
            rsync \
            unzip

          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Install Flutter dependencies
        shell: bash
        working-directory: oimg
        run: |
          set -euo pipefail
          flutter pub get
          dart pub get --directory rust_builder/cargokit/build_tool

      - name: Run release checks
        shell: bash
        working-directory: oimg
        run: |
          set -euo pipefail
          flutter analyze
          flutter test test/settings test/file_open_controller_test.dart test/file_open_channel_test.dart test/optimization
          env RUSTC_WRAPPER= CARGO_BUILD_RUSTC_WRAPPER= cargo test --manifest-path rust/Cargo.toml

      - name: Build Debian package
        shell: bash
        working-directory: oimg
        run: |
          set -euo pipefail
          ./scripts/linux/package-deb.sh

      - name: Verify Debian package
        id: deb
        shell: bash
        working-directory: oimg
        run: |
          set -euo pipefail
          deb_path="$(find "$DIST_DIR" -maxdepth 1 -type f -name '*.deb' | sort | tail -n 1)"
          if [[ -z "$deb_path" || ! -f "$deb_path" ]]; then
            echo "Expected Debian package not found in $DIST_DIR" >&2
            exit 1
          fi

          dpkg-deb -I "$deb_path"
          dpkg-deb -I "$deb_path" | grep -E 'Architecture:[[:space:]]*amd64'
          dpkg-deb -I "$deb_path" | grep 'python3-nautilus'
          dpkg-deb -c "$deb_path" | grep '/opt/oimg/oimg-service'
          dpkg-deb -c "$deb_path" | grep '/usr/share/nautilus-python/extensions/oimg.py'
          dpkg-deb -c "$deb_path" | grep '/usr/share/applications/oimg.desktop'

          rm -rf /tmp/oimg-deb-root
          dpkg-deb -x "$deb_path" /tmp/oimg-deb-root
          desktop-file-validate /tmp/oimg-deb-root/usr/share/applications/oimg.desktop
          python3 -m py_compile /tmp/oimg-deb-root/usr/share/nautilus-python/extensions/oimg.py

          echo "path=$deb_path" >> "$GITHUB_OUTPUT"
          echo "filename=$(basename "$deb_path")" >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Pull existing APT repository from R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: auto
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          mkdir -p "$APT_REPO_DIR"
          aws s3 sync "s3://$R2_BUCKET" "$APT_REPO_DIR" --endpoint-url "$R2_ENDPOINT"

      - name: Update APT metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$APT_REPO_DIR/pool/main"
          mkdir -p "$APT_REPO_DIR/dists/stable/main/binary-amd64"

          cp "${{ steps.deb.outputs.path }}" "$APT_REPO_DIR/pool/main/${{ steps.deb.outputs.filename }}"
          cp "$GITHUB_WORKSPACE/oimg/scripts/linux/apt-install.sh" "$APT_REPO_DIR/install.sh"

          cd "$APT_REPO_DIR"
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          apt-ftparchive -c "$GITHUB_WORKSPACE/oimg/apt-release.conf" release dists/stable > dists/stable/Release

      - name: Sign APT metadata
        shell: bash
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          cd "$APT_REPO_DIR"
          rm -f dists/stable/InRelease dists/stable/Release.gpg

          gpg --default-key "$GPG_KEY_ID" --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --clearsign -o dists/stable/InRelease dists/stable/Release

          gpg --default-key "$GPG_KEY_ID" --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            -abs -o dists/stable/Release.gpg dists/stable/Release

      - name: Upload APT repository to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: auto
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          aws s3 sync "$APT_REPO_DIR" "s3://$R2_BUCKET" \
            --endpoint-url "$R2_ENDPOINT" \
            --delete
